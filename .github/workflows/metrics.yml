name: Generate High Aesthetic Cards

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a private token for checkout to ensure full push permissions.
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Public Language Distribution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-language-stats.js

      - name: Public Contribution Graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-contribution-graph.js

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add top-langs.svg contribution-graph.svg
          git commit -m "Update generated profile stats [skip ci]" || exit 0
          # Rebase before pushing to resolve conflicts.
          git pull --rebase origin main
          git push
