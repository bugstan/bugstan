<rect x="339.62" y="0" width="34.91" height="10" fill="#dea584" />
<rect x="374.54" y="0" width="24.61" height="10" fill="#b07219" />
<rect x="399.14" y="0" width="21.67" height="10" fill="#3572A5" />
<rect x="420.81" y="0" width="19.19" height="10" fill="#f34b7d" />
    </g>
  </svg>

