<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220" viewBox="0 0 480 220" role="img" aria-labelledby="title desc">
  <title id="title">Language Distribution</title>
  <desc id="desc">Language distribution across bugstan personal repositories and n2ns public organization repositories, excluding HTML and CSS.</desc>
  <style>
    svg { background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .panel { fill: transparent; }
    .heading { fill: #fe428e; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #777; font-size: 13px; }
    .language { fill: #777; font-size: 14px; font-weight: 600; }
    .percent { fill: #666; font-size: 13px; text-anchor: end; }
  </style>
  <rect x="0" y="0" width="480" height="220" class="panel" />
  <text x="20" y="34" class="heading">Most used languages</text>
  <text x="20" y="54" class="subtitle">39 source repositories · bugstan personal + n2ns public</text>
  <svg x="20" y="68" width="440" height="10" viewBox="0 0 440 10">
    <clipPath id="bar-clip"><rect x="0" y="0" width="440" height="10" rx="5" /></clipPath>
    <g clip-path="url(#bar-clip)">
      <rect x="0.00" y="0" width="164.49" height="10" fill="#4F5D95" />
<rect x="164.49" y="0" width="100.55" height="10" fill="#3178c6" />
<rect x="265.03" y="0" width="55.17" height="10" fill="#A97BFF" />
<rect x="320.20" y="0" width="32.57" height="10" fill="#00ADD8" />
<rect x="352.77" y="0" width="31.14" height="10" fill="#dea584" />
<rect x="383.90" y="0" width="21.94" height="10" fill="#b07219" />
<rect x="405.85" y="0" width="17.11" height="10" fill="#f34b7d" />
<rect x="422.96" y="0" width="17.04" height="10" fill="#3572A5" />
    </g>
  </svg>

